# Lecture 3 — Data Structures

- question: "Which Python data structure preserves insertion order and allows duplicates?"
  type: single
  answers:
    - "`set`"
    - "`dict`"
    - "`list`"
    - "`frozenset`"
  correct: C
  explanation: "Lists are ordered and allow duplicate values."

- question: |
    What is the output of this code?

    ```python
    d = {'a': 1, 'b': 2}
    print(d['c'])
    ```
  type: single
  answers:
    - "`None`"
    - "`0`"
    - "`KeyError`"
    - "An empty string"
  correct: C
  explanation: "Accessing a missing key raises a KeyError. Use `d.get('c')` to get None instead."

- question: "Which of the following are true about Python sets?"
  type: multiple
  answers:
    - "Sets are unordered"
    - "Sets allow duplicate values"
    - "Sets support membership testing with `in`"
    - "Sets can contain lists as elements"
  correct:
    - A
    - C
  explanation: "Sets are unordered, deduplicate automatically, and support fast `in` checks. Lists are unhashable so cannot be set elements."

- question: "Which method removes and returns the last element of a list?"
  type: single
  answers:
    - "`list.remove()`"
    - "`list.pop()`"
    - "`list.delete()`"
    - "`list.discard()`"
  correct: B
  explanation: "pop() without an argument removes and returns the last element."

- question: "Which of the following create a dictionary in Python?"
  type: multiple
  answers:
    - "`{'key': 'value'}`"
    - "`dict(key='value')`"
    - "`['key', 'value']`"
    - "`dict([('key', 'value')])`"
  correct:
    - A
    - B
    - D
  explanation: "C creates a list, not a dictionary."
