# Lecture 6 — Geschichte (Deutsch)

- question: "Wann begann der Erste Weltkrieg?"
  type: single
  answers:
    - "1870"
    - "1914"
    - "1918"
    - "1939"
  correct: B
  explanation: "Der Erste Weltkrieg begann am 28. Juli 1914 mit der österreichisch-ungarischen Kriegserklärung an Serbien."

- question: "Welche der folgenden Faktoren trugen zum Ausbruch des Ersten Weltkriegs bei?"
  type: multiple
  answers:
    - "Das Bündnissystem der europäischen Großmächte"
    - "Der Imperialismus und koloniale Rivalitäten"
    - "Die Erfindung des Internets"
    - "Nationalismus und ethnische Spannungen auf dem Balkan"
  correct:
    - A
    - B
    - D
  explanation: "Das Attentat auf Erzherzog Franz Ferdinand war der Auslöser, aber die eigentlichen Ursachen waren das Bündnisgeflecht, Imperialismus und nationalistisch aufgeladene Konflikte."

- question: "Was beschloss der **Wiener Kongress** (1814–1815)?"
  type: single
  answers:
    - "Die Abschaffung der Monarchien in Europa"
    - "Die Neuordnung Europas nach den Napoleonischen Kriegen"
    - "Die Gründung des Deutschen Kaiserreichs"
    - "Den Beitritt Preußens zur Französischen Republik"
  correct: B
  explanation: "Der Wiener Kongress legte die politische Landkarte Europas nach dem Sturz Napoleons neu fest — unter dem Leitprinzip der Restauration und des Gleichgewichts der Mächte."

- question: "Was ist wahr für die **Weimarer Republik** (1919–1933)?"
  type: multiple
  answers:
    - "Sie war die erste parlamentarische Demokratie in Deutschland"
    - "Sie endete mit der Machtübernahme der NSDAP"
    - "Sie wurde durch den Versailler Vertrag gestärkt"
    - "Die Hyperinflation von 1923 erschütterte das Vertrauen in den Staat"
  correct:
    - A
    - B
    - D
  explanation: "Der Versailler Vertrag belastete die Republik durch Reparationen und Gebietsabtretungen schwer — er war eine Quelle politischer Instabilität, keine Stärkung."

- question: "In welchem Jahr fiel die Berliner Mauer?"
  type: single
  answers:
    - "1985"
    - "1989"
    - "1991"
    - "1993"
  correct: B
  explanation: "Die Berliner Mauer fiel in der Nacht vom 9. auf den 10. November 1989 — ein Symbol für das Ende der deutschen Teilung und des Kalten Krieges."

- question: "Was markierte die **Französische Revolution** von 1789?"
  type: single
  answers:
    - "Den Beginn der Industrialisierung in Frankreich"
    - "Den Sturz des Absolutismus und die Proklamation von Volkssouveränität und bürgerlichen Rechten"
    - "Die Gründung der Ersten Französischen Republik unter Napoleon"
    - "Die Abschaffung des Privateigentums"
  correct: B
  explanation: "Die Revolution beendete den absolutistischen Anspruch der Krone und setzte Ideen der Aufklärung (Freiheit, Gleichheit, Volksouveränität) politisch in Gang."
