# Lecture 3 — Mathematics: Linear Algebra & Statistics

- question: |
    Let $A = \begin{pmatrix} 2 & 0 \\ 0 & 3 \end{pmatrix}$. What is $\det(A)$?
  type: single
  answers:
    - "$5$"
    - "$6$"
    - "$1$"
    - "$0$"
  correct: B
  explanation: "For a diagonal matrix, the determinant is the product of the diagonal entries: 2 × 3 = 6."

- question: |
    Which of the following vectors is an eigenvector of $A = \begin{pmatrix} 3 & 0 \\ 0 & 5 \end{pmatrix}$ with eigenvalue 5?
  type: single
  answers:
    - "$\\begin{pmatrix} 1 \\\\ 0 \\end{pmatrix}$"
    - "$\\begin{pmatrix} 0 \\\\ 1 \\end{pmatrix}$"
    - "$\\begin{pmatrix} 1 \\\\ 1 \\end{pmatrix}$"
    - "$\\begin{pmatrix} 3 \\\\ 5 \\end{pmatrix}$"
  correct: B
  explanation: "A · (0,1)ᵀ = (0, 5)ᵀ = 5 · (0,1)ᵀ. The standard basis vectors are eigenvectors of diagonal matrices."

- question: |
    A dataset has values $\{2, 4, 4, 4, 5, 5, 7, 9\}$.

    What is the **variance** $\sigma^2$?
  type: single
  answers:
    - "$2$"
    - "$4$"
    - "$3$"
    - "$5$"
  correct: B
  explanation: "Mean = 5. Variance = average squared deviation = (9+1+1+1+0+0+4+16)/8 = 32/8 = 4."

- question: "Which of the following statements about the normal distribution $\\mathcal{N}(\\mu, \\sigma^2)$ are true?"
  type: multiple
  answers:
    - "It is symmetric around its mean $\\mu$"
    - "Approximately 95% of values lie within $2\\sigma$ of the mean"
    - "The mean and median are always different"
    - "The total area under the curve equals 1"
  correct:
    - A
    - B
    - D
  explanation: "The normal distribution is symmetric, so mean = median = mode. The 68-95-99.7 rule gives the interval coverage."

- question: |
    What is true for an **orthogonal matrix** $Q$?
  type: multiple
  answers:
    - "$Q^T Q = I$"
    - "$\\det(Q) = 0$"
    - "$Q^{-1} = Q^T$"
    - "The columns of $Q$ form an orthonormal basis"
  correct:
    - A
    - C
    - D
  explanation: "By definition, QᵀQ = I, so Q⁻¹ = Qᵀ. The determinant is ±1, not 0 (orthogonal matrices are invertible)."

- question: |
    Two random variables $X$ and $Y$ have correlation $\rho = 0$.

    What can you conclude?
  type: single
  answers:
    - "X and Y are independent"
    - "X and Y are linearly uncorrelated"
    - "Knowing X tells you nothing about Y"
    - "The covariance $\text{Cov}(X, Y) > 0$"
  correct: B
  explanation: "Zero correlation means no linear relationship. X and Y can still be dependent in a non-linear way (e.g. Y = X²)."
