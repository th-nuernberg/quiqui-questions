# Stable URL segment for the participant join link: /join/<session_url>
# Participants can bookmark this — it stays the same across all questions in a lecture.
# If omitted, a random short ID is generated each time a question is activated.
#
# IMPORTANT: session_url must be unique across all users of the same QuiQui instance.
# Generic names like "python101" or "demo" will conflict if two lecturers use the same name
# at the same time. Include an organisation or course abbreviation to make it unique,
# e.g. "tum-python101", "ki-zentrum-demo".
#
# Allowed characters: letters, digits, hyphen (-) and underscore (_), 1–64 characters.
# No spaces, slashes, or dots — session_url becomes part of the join URL and QR code,
# so an invalid value is rejected when you pull the repo (and would break the projector QR).
session_url: demo

# Optional: a shortlink participants can type instead of the long /join/ URL.
# Point it at <your-quiqui-host>/join/<session_url> yourself — QuiQui only displays
# it, it doesn't create or check it. The QR code still uses the real join URL.
# (Older key `student_shortlink` is also read, as a fallback.)
# host_shortlink: https://t.ly/your-code

# Optional: randomise each question's answer order (default false). Shuffled once
# per load; the whole room sees the same order. A question can opt out with its own
# `shuffle: false`. The correct-answer letter is remapped, so Reveal stays correct.
shuffle: false

# Display name shown in the header and browser tab as "QuiQui: <title>"
# Appears on both host and participant views.
title: Demo Quiz
