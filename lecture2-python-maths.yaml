# Lecture 2 — Python Maths

- question: |
    What is the closed-form result of this sum?

    $$\sum_{i=1}^{n} i$$
  type: single
  answers:
    - "$\\dfrac{n(n+1)}{2}$"
    - "$n^2$"
    - "$\\dfrac{n^2+1}{2}$"
    - "$n(n-1)$"
  correct: A
  explanation: "Gauss's formula: the sum of the first n integers is n(n+1)/2."

- question: |
    Which Python expression correctly computes $\lfloor \sqrt{x} \rfloor$ for a positive integer `x`?
  type: single
  answers:
    - "`x ** 0.5`"
    - "`int(x ** 0.5)`"
    - "`x // 2`"
    - "`math.ceil(x ** 0.5)`"
  correct: B
  explanation: "x ** 0.5 gives a float; int() truncates toward zero, which equals the floor for positive values."

- question: |
    The following function is supposed to compute $n!$ recursively.

    ```python
    def factorial(n):
        if n == 0:
            return 1
        return n * factorial(n - 1)
    ```

    What does `factorial(4)` return?
  type: single
  answers:
    - "`8`"
    - "`16`"
    - "`24`"
    - "`12`"
  correct: C
  explanation: "4! = 4 × 3 × 2 × 1 = 24."

- question: "Which NumPy expression computes the dot product of two 1-D arrays `a` and `b`?"
  type: single
  answers:
    - "`a * b`"
    - "`np.dot(a, b)`"
    - "`np.cross(a, b)`"
    - "`a @ a`"
  correct: B
  explanation: "np.dot computes the inner product. a * b is element-wise multiplication. a @ b also works for 1-D arrays but np.dot is the conventional choice."

- question: "What is true for the Python `float` type?"
  type: multiple
  answers:
    - "It uses 64-bit IEEE 754 double precision"
    - "It can represent all real numbers exactly"
    - "`0.1 + 0.2 == 0.3` evaluates to `False`"
    - "Division of two `int` values with `/` returns a `float`"
  correct:
    - A
    - C
    - D
  explanation: "Floats have finite precision; 0.1 and 0.2 cannot be represented exactly in binary, so their sum differs from 0.3 by a tiny rounding error."

- question: |
    What is true for the following NumPy code?

    ```python
    import numpy as np
    A = np.array([[1, 2], [3, 4]])
    B = np.array([[5, 6], [7, 8]])
    C = A @ B
    ```
  type: multiple
  answers:
    - "`C` is the matrix product of A and B"
    - "`C[0, 0]` equals `19`"
    - "`A * B` gives the same result as `A @ B`"
    - "`C` has shape `(2, 2)`"
  correct:
    - A
    - B
    - D
  explanation: "@ is matrix multiplication. A * B is element-wise. C[0,0] = 1*5 + 2*7 = 19."
