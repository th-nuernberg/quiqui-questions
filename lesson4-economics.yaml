# Lesson 4 — Microeconomics

- question: "A consumer's demand for a good falls when its price rises. This is best explained by:"
  type: single
  answers:
    - "The law of supply"
    - "The law of demand"
    - "Price elasticity of supply"
    - "Consumer surplus maximisation"
  correct: B
  explanation: "The law of demand states that, all else equal, quantity demanded decreases as price increases."

- question: |
    A market is in equilibrium. The government introduces a **price ceiling below** the equilibrium price.

    What is the most likely outcome?
  type: single
  answers:
    - "Surplus"
    - "Shortage"
    - "No change in quantity demanded"
    - "The equilibrium price rises"
  correct: B
  explanation: "A binding price ceiling keeps the price below equilibrium: quantity demanded exceeds quantity supplied, creating a shortage."

- question: "What is true for a **perfectly competitive** market?"
  type: multiple
  answers:
    - "Individual firms are price takers"
    - "There are many buyers and sellers"
    - "Firms earn positive economic profit in the long run"
    - "Products are homogeneous"
  correct:
    - A
    - B
    - D
  explanation: "In long-run equilibrium in perfect competition, free entry drives economic profit to zero. Price-taking and homogeneous products are defining features."

- question: |
    A firm's total cost is $TC(q) = 100 + 4q + q^2$.

    What is the **marginal cost** at $q = 5$?
  type: single
  answers:
    - "$4$"
    - "$9$"
    - "$14$"
    - "$29$"
  correct: C
  explanation: "MC = dTC/dq = 4 + 2q. At q = 5: MC = 4 + 10 = 14."

- question: "Which of the following are examples of **market failure**?"
  type: multiple
  answers:
    - "Negative externalities (e.g. pollution)"
    - "A competitive firm lowering its price"
    - "Public goods being under-provided"
    - "Information asymmetry between buyer and seller"
  correct:
    - A
    - C
    - D
  explanation: "Market failures occur when the free market does not allocate resources efficiently — externalities, public goods, and information problems are classic cases."

- question: "A good is **price inelastic** when the absolute value of its price elasticity of demand is:"
  type: single
  answers:
    - "Greater than 1"
    - "Equal to 1"
    - "Less than 1"
    - "Equal to 0 only"
  correct: C
  explanation: "Elasticity < 1 (in absolute value) means quantity demanded responds less than proportionally to a price change — the good is inelastic."
